<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="plumGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#613C70" />
      <stop offset="100%" stop-color="#4A2E56" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4A2E56" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Background Shield/Circle -->
  <rect width="100" height="100" rx="24" fill="#FAF7F2" />
  <rect x="5" y="5" width="90" height="90" rx="20" fill="none" stroke="#E8E1EF" stroke-width="2" />

  <!-- Heart Icon (Vector paths) -->
  <path d="M50,80 L20,50 C10,38 24,20 40,32 L50,42 L60,32 C76,20 90,38 80,50 Z" 
        fill="url(#plumGrad)" 
        filter="url(#shadow)" />
        
  <!-- Cross in heart -->
  <path d="M50,42 L50,62 M40,52 L60,52" 
        stroke="#87A987" 
        stroke-width="5" 
        stroke-linecap="round" />
</svg>
